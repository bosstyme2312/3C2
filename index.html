<div class="card">
    <h2>🎰 Machine à Chance Premium</h2>

    <p>💰 Crédits : <span id="credits">100</span></p>
    <p>⭐ XP : <span id="xp">0</span></p>
    <p>🏆 Niveau : <span id="level">1</span></p>

    <button class="action" onclick="slot()">
        Jouer (-10 crédits)
    </button>

    <button class="action" onclick="bonus()">
        🎁 Bonus quotidien
    </button>

    <div id="slotR"></div>
</div>

<script>
let credits = 100;
let xp = 0;
let level = 1;

function updateStats(){
    document.getElementById("credits").textContent = credits;
    document.getElementById("xp").textContent = xp;
    document.getElementById("level").textContent = level;
}

function addXP(amount){
    xp += amount;

    while(xp >= level * 100){
        level++;
    }

    updateStats();
}

function slot(){

    if(credits < 10){
        document.getElementById("slotR").innerHTML =
        "❌ Tu n'as plus assez de crédits !";
        return;
    }

    credits -= 10;

    let emojis = ["🍒","🍋","🍉","⭐","💎","🔔"];

    let a = emojis[Math.floor(Math.random()*emojis.length)];
    let b = emojis[Math.floor(Math.random()*emojis.length)];
    let c = emojis[Math.floor(Math.random()*emojis.length)];

    let gain = 0;
    let message = "";

    if(a===b && b===c){

        if(a==="💎"){
            gain = 500;
            addXP(100);
            message = "💎💎💎 JACKPOT DIAMANT !";
        }
        else{
            gain = 150;
            addXP(50);
            message = "🎉 JACKPOT !";
        }

    }else if(a===b || b===c || a===c){

        gain = 40;
        addXP(15);
        message = "✨ Double combinaison !";

    }else{

        gain = 0;
        addXP(2);
        message = "😢 Perdu.";

    }

    credits += gain;

    document.getElementById("slotR").innerHTML =
        "<h3>" + a + " " + b + " " + c + "</h3>" +
        "<p>" + message + "</p>" +
        "<p>💰 Gain : " + gain + " crédits</p>";

    updateStats();
}

function bonus(){
    credits += 25;
    addXP(5);

    document.getElementById("slotR").innerHTML =
    "🎁 Bonus récupéré : +25 crédits";

    updateStats();
}

updateStats();
</script>
